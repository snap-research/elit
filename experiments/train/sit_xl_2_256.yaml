# Usage:
#   accelerate launch train.py --config experiments/train/sit_xl_2_256.yaml
#   accelerate launch train.py --config experiments/train/sit_xl_2_256.yaml --resume-step -1

# ── experiment ──
exp_name: sit-xl-2-256px
output_dir: exps
report_to: wandb

# ── model ──
model: SiT-XL/2

# ── dataset ──
data_dir: /path/to/imagenet_256/train
resolution: 256
batch_size: 256

# ── precision ──
allow_tf32: true
mixed_precision: bf16

# ── optimization ──
learning_rate: 1.0e-4
max_train_steps: 400000
checkpointing_steps: 50000
sampling_steps: 10000

# ── loss ──
path_type: linear
prediction: v
weighting: uniform

enc_type: none
proj_coeff: 0.0

seed: 0
resume_step: -1
