# Usage:
#   accelerate launch train.py --config experiments/train/elit_sit_xl_512_multibudget.yaml
#   accelerate launch train.py --config experiments/train/elit_sit_xl_512_multibudget.yaml --resume-step -1

# ── experiment ──
exp_name: elit-sit-xl-2-512px-multibudget
output_dir: exps
report_to: wandb

# ── model ──
model: ELIT-SiT-XL/2

# ── dataset ──
data_dir: /path/to/imagenet_512/train
s3_cache_dir: /lssd/imagenet_512_cache/
resolution: 512
batch_size: 256

# ── precision ──
allow_tf32: true
mixed_precision: bf16

# ── optimization ──
learning_rate: 1.0e-4
max_train_steps: 7000000
checkpointing_steps: 50000
sampling_steps: 10000
lr_scheduler_type: constant_with_linear_warmup
warmup_steps: 10000

# ── loss ──
path_type: linear
prediction: v
weighting: lognormal


enc_type: none
proj_coeff: 0.0

# ── ELIT-specific ──
elit_max_mask_prob: 0.9375
elit_min_mask_prob: 0.0
elit_group_size: 8

seed: 0
resume_step: -1
