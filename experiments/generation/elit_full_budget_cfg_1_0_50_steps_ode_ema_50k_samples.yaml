# ─────────────────────────────────────────────────────────────────
# Eval config: ELIT-SiT-XL/2  |  256×256
# ─────────────────────────────────────────────────────────────────
# Usage:
#   torchrun --nproc_per_node=8 generate.py \
#       --train-config experiments/train/elit_sit_xl_256.yaml \
#       --eval-config  experiments/generation/elit_sit_xl_256.yaml \
#       --ckpt exps/elit-sit-xl-2-256px/checkpoints/0400000.pt

# ── ELIT inference ──
inference_budget: 1.0        # 1.0 = full budget (no masking); set < 1 for efficiency

# ── sampling ──
mode: ode
num_steps: 50
cfg_scale: 1.0
guidance_low: 0.0
guidance_high: 1.0
path_type: linear
heun: false

# ── output ──
num_fid_samples: 50000
per_proc_batch_size: 32
vae: ema
global_seed: 0
